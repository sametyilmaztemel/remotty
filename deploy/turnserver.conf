# Coturn TURN/STUN server configuration for remotty
# ===================================================

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay ports range (min-max)
min-port=49152
max-port=65535

# Fingerprint attribute in TURN messages (RFC 6062 compliance)
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm (used for authentication realm)
realm=remotty.local

# TURN credentials — override via environment variables
# Format: user=<username>:<password>
# Set via TURN_USERNAME and TURN_PASSWORD env vars (see docker-compose.yml)
user=remotty:changeme

# STUN functionality enabled by default; make sure it responds
stun-only=0

# Allow loopback connections (for local development)
loopback-peers=1

# Enable CLI status
cli-port=5766

# Logging
verbose
syslog

# No need for TLS certificate files for now — using plain UDP/TCP
# For TLS certificate support, mount cert.pem and privkey.pem into /etc/ssl/certs/
# and uncomment:
# cert=/etc/ssl/certs/cert.pem
# pkey=/etc/ssl/certs/privkey.pem

# Deny these IP ranges from being used as relay endpoints
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# External IP address (set to the server's public IP if behind NAT)
# external-ip=<public-ip>
