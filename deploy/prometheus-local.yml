# remotty — Prometheus config for native (non-Docker) deployment
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Signal server health endpoint
  - job_name: 'remotty-signal'
    scrape_interval: 15s
    metrics_path: '/health'
    static_configs:
      - targets: ['host.docker.internal:9010']
        labels:
          service: 'signal'
          project: 'remotty'

  # Host daemon (if metrics enabled)
  - job_name: 'remotty-host'
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'host'
          project: 'remotty'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
