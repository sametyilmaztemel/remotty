version: '3.8'

services:
  remotty-signal:
    build:
      context: .
      dockerfile: Dockerfile.signal
    ports:
      - "9000:9000"
    environment:
      - REMOTTY_AUTH_TOKEN=${REMOTTY_AUTH_TOKEN:-dev-token}
    restart: unless-stopped
    networks:
      - remotty-net

  remotty-web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - remotty-net

networks:
  remotty-net:
    driver: bridge
