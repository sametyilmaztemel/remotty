version: '3.8'

services:
  # ─── Coturn TURN/STUN server for WebRTC relay ───────────────────
  coturn:
    image: instrumentisto/coturn:latest
    container_name: remotty-coturn
    restart: unless-stopped
    ports:
      # TURN UDP (main relay port)
      - "3478:3478/udp"
      # TURN TCP (main relay port)
      - "3478:3478/tcp"
      # TURN TLS
      - "5349:5349/tcp"
      # TURN TLS UDP
      - "5349:5349/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - TURN_USERNAME=${TURN_USERNAME:-remotty}
      - TURN_PASSWORD=${TURN_PASSWORD:-changeme}
      - TURN_REALM=${TURN_REALM:-remotty.local}
    networks:
      - remotty-net
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ─── Signal server (WebSocket signaling) ─────────────────────────
  remotty-signal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.signal
    ports:
      - "${REMO_SIGNAL_PORT:-9010}:9000"
    environment:
      - REMOTTY_AUTH_TOKEN=${REMOTTY_AUTH_TOKEN:-dev-token}
    restart: unless-stopped
    networks:
      - remotty-net

  # ─── Host daemon (WebRTC host) ───────────────────────────────────
  remotty-host:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.signal
    environment:
      - REMOTTY_SIGNAL_URL=${REMOTTY_SIGNAL_URL:-ws://remotty-signal:9000}
      - REMOTTY_HOST_NAME=${REMOTTY_HOST_NAME:-docker-host}
      - REMOTTY_MASTER_PASSWORD=${REMOTTY_MASTER_PASSWORD:-}
      - REMOTTY_METRICS_ADDR=${REMOTTY_METRICS_ADDR:-:9091}
    depends_on:
      - remotty-signal
    restart: unless-stopped
    networks:
      - remotty-net
    entrypoint: ["remotty", "host"]

  # ─── Prometheus (metrics collection) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: remotty-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - remotty-net

  # ─── Grafana (metrics visualization) ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: remotty-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-remotty}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - remotty-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  remotty-net:
    driver: bridge
