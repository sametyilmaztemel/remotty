name: remotty CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -count=1 -timeout=60s

      - name: Build all binaries
        run: |
          go build ./cmd/remotty/...
          go build ./tui/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v6

  web:
    name: Web Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  ios-check:
    name: iOS Build Check
    runs-on: macos-14
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Swift packages
        run: |
          cd ios/remotty
          swift package resolve 2>&1 || true
      - name: Build check (simulator)
        run: |
          cd ios/remotty
          swift build -c debug \
            -Xswiftc "-sdk" -Xswiftc "$(xcrun --sdk iphonesimulator --show-sdk-path 2>/dev/null || echo /dev/null)" \
            -Xswiftc "-target" -Xswiftc "arm64-apple-ios17.0-simulator" \
            2>&1 | tail -20 || echo "⚠️ iOS build check non-fatal"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, web, ios-check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/sametyilmaztemel/remotty/internal/config.Version=${{ github.ref_name }}" -o dist/remotty-darwin-arm64 ./cmd/remotty
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/sametyilmaztemel/remotty/internal/config.Version=${{ github.ref_name }}" -o dist/remotty-linux-arm64 ./cmd/remotty
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/sametyilmaztemel/remotty/internal/config.Version=${{ github.ref_name }}" -o dist/remotty-linux-amd64 ./cmd/remotty

      - name: Build web client
        run: |
          cd web && npm ci && npm run build && cp -r dist ../dist/web

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
