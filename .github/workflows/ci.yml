name: remotyy CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests
        run: go test ./... -v -race -count=1 -timeout=60s

      - name: Build all binaries
        run: |
          go build ./cmd/remotyy/...
          go build ./tui/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: golangci/golangci-lint-action@v6

  web:
    name: Web Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, web]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/remotyy-darwin-arm64 ./cmd/remotyy
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/remotyy-linux-arm64 ./cmd/remotyy
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/remotyy-linux-amd64 ./cmd/remotyy

      - name: Build web client
        run: |
          cd web && npm ci && npm run build && cp -r dist ../dist/web

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
