name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-go:
    name: Build Go binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build remotty
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o dist/remotty-${{ matrix.goos }}-${{ matrix.goarch }} \
            -ldflags="-s -w -X github.com/sametyilmaztemel/remotty/internal/config.Version=${{ github.ref_name }}" \
            ./cmd/remotty
      
      - name: Package
        run: |
          cd dist
          tar czf remotty-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            remotty-${{ matrix.goos }}-${{ matrix.goarch }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: remotty-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/remotty-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  build-web:
    name: Build web client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - run: cd web && npm ci && npm run build
      - run: mkdir -p dist && cd web && tar czf ../dist/remotty-web.tar.gz dist/
      
      - uses: actions/upload-artifact@v4
        with:
          name: remotty-web
          path: dist/remotty-web.tar.gz

  build-macos-app:
    name: Build, sign, notarize & DMG macOS app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build remotty binary (universal)
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build \
            -o dist/remotty-darwin-arm64 \
            -ldflags="-s -w" ./cmd/remotty
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build \
            -o dist/remotty-darwin-amd64 \
            -ldflags="-s -w" ./cmd/remotty
          lipo -create -output dist/remotty dist/remotty-darwin-arm64 dist/remotty-darwin-amd64
      
      - name: Build SwiftUI app
        run: |
          cd remotty-macOS
          swift build -c release --product remotty
          cd ..
      
      - name: Create .app bundle
        run: |
          APP_BUNDLE="dist/remotty.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          
          cp remotty-macOS/.build/release/remotty "$APP_BUNDLE/Contents/MacOS/"
          cp remotty-macOS/Info.plist "$APP_BUNDLE/Contents/"
          cp dist/remotty "$APP_BUNDLE/Contents/Resources/remottyd"
      
      - name: Import Developer ID Application certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import p12 certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          
          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security show-keychain-info "$KEYCHAIN_PATH"
      
      - name: Code sign .app bundle
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Get the signing identity from keychain
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with identity: $SIGNING_IDENTITY"
          
          # Sign the embedded Go helper binary first
          codesign --deep --force --verify --verbose --options=runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/remotty.app/Contents/Resources/remottyd"
          
          # Sign the main app bundle
          codesign --deep --force --verify --verbose --options=runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/remotty.app"
          
          # Verify signatures
          codesign -dvvv "dist/remotty.app"
          codesign --verify --verbose "dist/remotty.app"
      
      - name: Create DMG
        run: |
          # Create a temporary staging directory
          STAGING_DIR="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING_DIR"
          
          # Copy the signed .app into the staging dir
          cp -R "dist/remotty.app" "$STAGING_DIR/"
          
          # Create the DMG with hdiutil
          hdiutil create -volname "remotty" \
            -srcfolder "$STAGING_DIR" \
            -ov -format UDZO \
            "dist/remotty.dmg" 2>&1 | tail -1
          
          echo "✅ DMG created: dist/remotty.dmg"
          ls -lh dist/remotty.dmg
      
      - name: Notarize DMG with notarytool
        if: ${{ secrets.APPLE_NOTARIZATION_KEY_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
        run: |
          # Write the API key to a temp file
          echo "$APPLE_NOTARIZATION_KEY" > "$RUNNER_TEMP/auth_key.p8"
          
          # Submit to notarytool
          xcrun notarytool submit "dist/remotty.dmg" \
            --key "$RUNNER_TEMP/auth_key.p8" \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER_ID" \
            --wait \
            --output-format json 2>&1 | tee "$RUNNER_TEMP/notarization-result.json"
      
      - name: Staple notarization ticket
        if: ${{ secrets.APPLE_NOTARIZATION_KEY_ID != '' }}
        run: |
          xcrun stapler staple "dist/remotty.dmg"
          xcrun stapler validate "dist/remotty.dmg"
      
      - name: Notarize and staple fallback (stapler on .app)
        if: ${{ secrets.APPLE_NOTARIZATION_KEY_ID != '' }}
        run: |
          # Also staple the .app itself (for direct distribution)
          xcrun stapler staple "dist/remotty.app" || true
          echo "✅ Notarization complete"
      
      - uses: actions/upload-artifact@v4
        with:
          name: remotty-macos-app
          path: |
            dist/remotty.dmg
      
      - name: Build unsigned tar.gz fallback
        if: ${{ secrets.APPLE_CERTIFICATE == '' }}
        run: |
          cd dist
          tar czf remotty-macos-app.tar.gz remotty.app
      
      - uses: actions/upload-artifact@v4
        if: ${{ secrets.APPLE_CERTIFICATE == '' }}
        with:
          name: remotty-macos-app
          path: dist/remotty-macos-app.tar.gz

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build signal server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.signal
          outputs: type=docker,dest=/tmp/remotty-signal.tar
          tags: remotty-signal:latest
      
      - name: Build full daemon image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          outputs: type=docker,dest=/tmp/remotty-daemon.tar
          tags: remotty-daemon:latest
      
      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: remotty-docker
          path: /tmp/remotty-*.tar

  build-ios:
    name: Build iOS app
    runs-on: macos-14
    continue-on-error: true  # WebRTC SDK dep flaky olabilir
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      
      - name: Resolve Swift package dependencies
        run: |
          cd ios/remotty
          swift package resolve 2>&1 || echo "⚠️ Package resolution failed (non-fatal)"
      
      - name: Build iOS package (simulator)
        run: |
          cd ios/remotty
          swift build -c debug \
            -Xswiftc "-sdk" -Xswiftc "$(xcrun --sdk iphonesimulator --show-sdk-path 2>/dev/null || echo /dev/null)" \
            -Xswiftc "-target" -Xswiftc "arm64-apple-ios17.0-simulator" \
            2>&1 || echo "⚠️ iOS build check completed with warnings"
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: ios/remotty/.build/**/*.log

  release:
    name: Create Release
    needs: [build-go, build-web, build-macos-app, build-docker, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: remotty-*
          merge-multiple: true
      
      - name: List artifacts
        run: ls -la
      
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.dmg
          generate_release_notes: true
          make_latest: true
